<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Review — Cybis Café</title>
    <link rel="stylesheet" href="style/index.scss" />
  </head>
  <body class="review-page-layout">
    <header
      class="header bg-color bg-color--bright bg-cookie bg-cookie--bright"
    >
      <div class="headline bg-color" id="home">
        <a href="index.html" aria-label="Ir para o início — Cybis Café">
          <img
            src="img/Cybis-Cafe-Logo.png"
            alt="Logo do Cybis Café."
            class="headline__logo"
          />
        </a>
        <nav aria-label="Redes sociais">
          <ul class="headline__social">
            <li>
              <a href="#" target="_blank" rel="noopener noreferrer">Twitter</a>
            </li>
            <li>
              <a
                href="https://www.youtube.com/@CybisCafe"
                target="_blank"
                rel="noopener noreferrer"
                >YouTube</a
              >
            </li>
            <li>
              <a href="#" target="_blank" rel="noopener noreferrer"
                >Instagram</a
              >
            </li>
            <li>
              <a
                href="https://www.twitch.tv/cybiscafe"
                target="_blank"
                rel="noopener noreferrer"
                >Twitch</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="review-page">
      <div class="review-page__banner">
        <img src="img/atelier-iris-3.png" alt="" id="review-banner-img" />
      </div>

      <div class="review-page__header">
        <a href="index.html#reviews" class="review-page__back"
          >← Voltar para Reviews</a
        >
        <h1 class="review-page__title"></h1>
        <p class="review-page__summary"></p>
      </div>

      <article class="review-page__content">
        <div class="review-page__body"></div>
      </article>
    </main>

    <script type="module" src="js/review.js"></script>
  </body>
</html>
