<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin — Cybis Café</title>
    <link rel="stylesheet" href="style/index.scss" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        background: var(--color-secondary);
        color: var(--color-primary);
        font-family: var(--font-family-sans, sans-serif);
        margin: 0;
        min-height: 100vh;
      }

      .login-screen {
        align-items: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }

      .login-card {
        background: hsl(38 30% 10%);
        border: 2px solid var(--color-tertiary);
        border-radius: 12px;
        max-width: 400px;
        padding: 2.5rem;
        width: 100%;
      }

      .login-card h1 {
        font-size: 1.8rem;
        margin: 0 0 0.5rem;
        color: var(--color-primary);
      }
      .login-card p {
        color: hsl(38 30% 70%);
        font-size: 0.9rem;
        margin: 0 0 2rem;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        margin-bottom: 1.2rem;
      }

      .form-group label {
        color: hsl(38 30% 75%);
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        background: hsl(38 30% 8%);
        border: 1.5px solid hsl(38 30% 25%);
        border-radius: 6px;
        color: var(--color-primary);
        font-size: 1rem;
        outline: none;
        padding: 0.7rem 1rem;
        transition: border-color 0.2s;
        width: 100%;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        border-color: var(--color-tertiary);
      }
      .form-group textarea {
        min-height: 100px;
        resize: vertical;
      }

      .btn {
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 700;
        padding: 0.75rem 1.5rem;
        transition:
          opacity 0.2s,
          transform 0.15s;
      }
      .btn:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn:active {
        transform: translateY(0);
      }
      .btn-primary {
        background: var(--color-tertiary);
        color: white;
        width: 100%;
      }
      .btn-secondary {
        background: hsl(38 30% 20%);
        color: var(--color-primary);
      }
      .btn-danger {
        background: hsl(0 70% 45%);
        color: white;
        font-size: 0.85rem;
        padding: 0.4rem 0.8rem;
      }
      .btn-sm {
        font-size: 0.8rem;
        padding: 0.35rem 0.7rem;
      }

      .error-msg {
        background: hsl(0 70% 20%);
        border: 1px solid hsl(0 70% 45%);
        border-radius: 6px;
        color: hsl(0 70% 80%);
        font-size: 0.875rem;
        margin-bottom: 1rem;
        padding: 0.75rem 1rem;
      }

      .success-msg {
        background: hsl(140 60% 15%);
        border: 1px solid hsl(140 60% 35%);
        border-radius: 6px;
        color: hsl(140 60% 70%);
        font-size: 0.875rem;
        margin-bottom: 1rem;
        padding: 0.75rem 1rem;
      }

      .admin-screen {
        display: none;
      }

      .admin-header {
        align-items: center;
        background: hsl(38 30% 6%);
        border-bottom: 2px solid var(--color-tertiary);
        display: flex;
        justify-content: space-between;
        padding: 1rem 2rem;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .admin-header h1 {
        font-size: 1.2rem;
        margin: 0;
      }
      .admin-header span {
        color: var(--color-tertiary);
      }

      .admin-body {
        display: grid;
        gap: 2rem;
        grid-template-columns: 1fr 1.4fr;
        max-width: 1400px;
        margin: 0 auto;
        padding: 2rem;
      }
      @media (max-width: 900px) {
        .admin-body {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: hsl(38 30% 10%);
        border: 1.5px solid hsl(38 30% 20%);
        border-radius: 12px;
        padding: 1.5rem;
      }
      .panel h2 {
        border-bottom: 1px solid hsl(38 30% 20%);
        font-size: 1rem;
        margin: 0 0 1.5rem;
        padding-bottom: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--color-tertiary);
      }

      .review-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        max-height: 70vh;
        overflow-y: auto;
      }

      .review-item {
        align-items: center;
        background: hsl(38 30% 8%);
        border: 1.5px solid hsl(38 30% 18%);
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        gap: 1rem;
        padding: 0.75rem 1rem;
        transition: border-color 0.2s;
      }
      .review-item:hover,
      .review-item.active {
        border-color: var(--color-tertiary);
      }
      .review-item img {
        border-radius: 6px;
        height: 60px;
        object-fit: cover;
        width: 45px;
      }
      .review-item-info {
        flex: 1;
        min-width: 0;
      }
      .review-item-title {
        font-weight: 700;
        font-size: 0.95rem;
        margin: 0 0 0.2rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .review-item-slug {
        color: hsl(38 30% 55%);
        font-size: 0.75rem;
      }

      .editor-section {
        border: 1.5px solid hsl(38 30% 20%);
        border-radius: 8px;
        margin-bottom: 1rem;
        padding: 1rem;
      }
      .editor-section-header {
        align-items: center;
        display: flex;
        gap: 0.5rem;
        justify-content: space-between;
        margin-bottom: 0.75rem;
      }
      .editor-section-type {
        background: hsl(38 30% 20%);
        border-radius: 4px;
        color: var(--color-tertiary);
        font-size: 0.75rem;
        font-weight: 700;
        padding: 0.2rem 0.6rem;
        text-transform: uppercase;
      }
      .editor-section-type.quote-type {
        background: hsl(27 60% 20%);
        color: hsl(27 90% 60%);
      }
      .editor-section-type.image-type {
        background: hsl(200 60% 20%);
        color: hsl(200 90% 70%);
      }

      .sections-wrapper {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 1rem;
        max-height: 40vh;
        overflow-y: auto;
      }
      .add-section-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      .btn-add-text {
        background: hsl(38 30% 22%);
        color: var(--color-primary);
      }
      .btn-add-quote {
        background: hsl(27 60% 20%);
        color: hsl(27 90% 60%);
      }
      .btn-add-image {
        background: hsl(200 60% 20%);
        color: hsl(200 90% 70%);
      }

      .loading {
        color: hsl(38 30% 55%);
        font-size: 0.9rem;
        padding: 1rem;
        text-align: center;
      }
      .badge {
        background: var(--color-tertiary);
        border-radius: 999px;
        color: white;
        font-size: 0.7rem;
        padding: 0.15rem 0.5rem;
      }

      /* ── UPLOAD ── */
      .upload-group {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        margin-bottom: 1.2rem;
      }
      .upload-group label {
        color: hsl(38 30% 75%);
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .upload-area {
        align-items: center;
        background: hsl(38 30% 8%);
        border: 1.5px dashed hsl(38 30% 30%);
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        padding: 1.2rem;
        text-align: center;
        transition: border-color 0.2s;
      }
      .upload-area:hover {
        border-color: var(--color-tertiary);
      }
      .upload-area input[type='file'] {
        display: none;
      }
      .upload-area span {
        color: hsl(38 30% 55%);
        font-size: 0.85rem;
      }
      .upload-preview {
        border-radius: 6px;
        display: none;
        height: 80px;
        object-fit: cover;
        width: 60px;
      }
      .upload-status {
        color: hsl(38 30% 55%);
        font-size: 0.75rem;
        margin-top: 0.25rem;
      }
    </style>
  </head>

  <body>
    <!-- LOGIN -->
    <div class="login-screen" id="loginScreen">
      <div class="login-card">
        <h1>☕ Admin</h1>
        <p>Cybis Café — Área restrita</p>
        <div id="loginError" class="error-msg" style="display: none"></div>
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com" />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="loginPassword" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" id="loginBtn">Entrar</button>
      </div>
    </div>

    <!-- ADMIN -->
    <div class="admin-screen" id="adminScreen">
      <div class="admin-header">
        <div style="display: flex; align-items: center; gap: 1rem">
          <a
            href="index.html"
            style="
              display: inline-flex;
              align-items: center;
              gap: 0.4rem;
              color: hsl(38 30% 55%);
              font-size: 0.85rem;
              text-decoration: none;
              transition: color 0.2s;
            "
            onmouseover="this.style.color='var(--color-tertiary)'"
            onmouseout="this.style.color='hsl(38 30% 55%)'"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="16"
              height="16"
            >
              <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Voltar ao site
          </a>
          <h1 style="margin: 0">☕ Cybis Café — <span>Admin</span></h1>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center">
          <span
            id="userEmail"
            style="color: hsl(38 30% 55%); font-size: 0.85rem"
          ></span>
          <button class="btn btn-secondary btn-sm" id="logoutBtn">Sair</button>
        </div>
      </div>

      <div class="admin-body">
        <!-- LISTA -->
        <div class="panel">
          <h2>Reviews <span class="badge" id="reviewCount">0</span></h2>
          <div style="margin-bottom: 1rem">
            <button
              class="btn btn-primary"
              id="newReviewBtn"
              style="width: 100%"
            >
              + Nova Review
            </button>
          </div>
          <div class="review-list" id="reviewList">
            <div class="loading">Carregando...</div>
          </div>
        </div>

        <!-- EDITOR -->
        <div class="panel" id="editorPanel">
          <h2 id="editorTitle">Selecione uma review</h2>

          <div id="editorContent" style="display: none">
            <div class="form-group">
              <label>Título do jogo</label>
              <input
                type="text"
                id="fTitle"
                placeholder="Ex: Super Mario World"
              />
            </div>

            <div class="form-group">
              <label>Slug (ID único, sem espaços)</label>
              <input type="text" id="fSlug" placeholder="Ex: mario-world" />
            </div>

            <div class="form-group">
              <label>Resumo (subtítulo)</label>
              <input
                type="text"
                id="fSummary"
                placeholder="Uma frase sobre o jogo"
              />
            </div>

            <!-- BANNER -->
            <div class="upload-group">
              <label>Imagem Banner</label>
              <div class="upload-area" id="bannerUploadArea">
                <input type="file" id="fBannerFile" accept="image/*" />
                <img
                  class="upload-preview"
                  id="bannerPreview"
                  alt="Preview banner"
                />
                <span id="bannerUploadLabel">📁 Clique para selecionar</span>
              </div>
              <span class="upload-status" id="bannerStatus"></span>
              <input type="hidden" id="fBanner" />
            </div>

            <!-- CAPA DO CARROSSEL -->
            <div class="upload-group">
              <label>Imagem Carrossel (Capa)</label>
              <div class="upload-area" id="coverUploadArea">
                <input type="file" id="fCoverFile" accept="image/*" />
                <img
                  class="upload-preview"
                  id="coverPreview"
                  alt="Preview capa"
                />
                <span id="coverUploadLabel">📁 Clique para selecionar</span>
              </div>
              <span class="upload-status" id="coverStatus"></span>
              <input type="hidden" id="fCover" />
            </div>

            <div class="form-group">
              <label>Plataformas</label>
              <input
                type="text"
                id="fPlatforms"
                placeholder="Ex: PS2, PC, Nintendo Switch"
              />
            </div>

            <div class="form-group">
              <label>Nota (0–10)</label>
              <input
                type="number"
                id="fScore"
                min="0"
                max="10"
                step="0.1"
                placeholder="8.5"
              />
            </div>

            <hr style="border-color: hsl(38 30% 20%); margin: 1.5rem 0" />

            <h3
              style="
                font-size: 0.85rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: var(--color-tertiary);
                margin: 0 0 0.75rem;
              "
            >
              Conteúdo da Review
            </h3>

            <div class="add-section-buttons">
              <button class="btn btn-sm btn-add-text" id="addText">
                + Parágrafo
              </button>
              <button class="btn btn-sm btn-add-quote" id="addQuote">
                + Citação
              </button>
              <button class="btn btn-sm btn-add-image" id="addImage">
                + Imagem
              </button>
            </div>

            <div class="sections-wrapper" id="sectionsWrapper"></div>

            <div id="saveMsg" style="display: none; margin-bottom: 1rem"></div>

            <div style="display: flex; gap: 0.75rem; flex-wrap: wrap">
              <button class="btn btn-primary" id="saveReviewBtn">
                💾 Salvar
              </button>
              <button
                class="btn btn-danger"
                id="deleteReviewBtn"
                style="display: none"
              >
                🗑 Excluir
              </button>
            </div>
          </div>

          <p
            id="editorPlaceholder"
            style="color: hsl(38 30% 45%); font-size: 0.9rem"
          >
            Selecione uma review à esquerda ou crie uma nova.
          </p>
        </div>
      </div>
    </div>

    <script type="module">
      import { createClient } from '@supabase/supabase-js'

      let currentReviewId = null
      let sections = []

      const SB_URL = 'https://thapqeodawxffacnljij.supabase.co'
      const SB_KEY = 'sb_publishable_TZQOtUq1RwjDGBpWDb92UA_KZwAOHUS'
      const supabase = createClient(SB_URL, SB_KEY)

      // ── AUTH ──
      document
        .getElementById('loginBtn')
        .addEventListener('click', async () => {
          const email = document.getElementById('loginEmail').value.trim()
          const password = document.getElementById('loginPassword').value
          const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password,
          })
          if (error) return showError(error.message)
          showAdmin(data.user)
        })

      document
        .getElementById('logoutBtn')
        .addEventListener('click', async () => {
          await supabase.auth.signOut()
          location.reload()
        })

      async function checkSession() {
        const {
          data: { session },
        } = await supabase.auth.getSession()
        if (session) showAdmin(session.user)
      }
      checkSession()

      function showError(msg) {
        const el = document.getElementById('loginError')
        el.textContent = msg
        el.style.display = 'block'
      }

      function showAdmin(user) {
        document.getElementById('loginScreen').style.display = 'none'
        document.getElementById('adminScreen').style.display = 'block'
        document.getElementById('userEmail').textContent = user.email
        loadReviews()
      }

      // ── UPLOAD ──
      function setupUpload(
        areaId,
        inputId,
        previewId,
        labelId,
        statusId,
        hiddenId,
      ) {
        const area = document.getElementById(areaId)
        const input = document.getElementById(inputId)
        const preview = document.getElementById(previewId)
        const label = document.getElementById(labelId)
        const status = document.getElementById(statusId)

        area.addEventListener('click', () => input.click())

        input.addEventListener('change', async () => {
          const file = input.files[0]
          if (!file) return

          label.textContent = file.name
          status.textContent = 'Enviando...'

          const ext = file.name.split('.').pop()
          const path = `${Date.now()}-${Math.random()
            .toString(36)
            .slice(2)}.${ext}`

          const { error } = await supabase.storage
            .from('reviews')
            .upload(path, file)
          if (error) {
            status.textContent = `Erro: ${error.message}`
            return
          }

          const {
            data: { publicUrl },
          } = supabase.storage.from('reviews').getPublicUrl(path)
          document.getElementById(hiddenId).value = publicUrl

          preview.src = publicUrl
          preview.style.display = 'block'
          status.textContent = '✅ Upload concluído'
        })
      }

      setupUpload(
        'bannerUploadArea',
        'fBannerFile',
        'bannerPreview',
        'bannerUploadLabel',
        'bannerStatus',
        'fBanner',
      )
      setupUpload(
        'coverUploadArea',
        'fCoverFile',
        'coverPreview',
        'coverUploadLabel',
        'coverStatus',
        'fCover',
      )

      // ── REVIEWS CRUD ──
      async function loadReviews() {
        const { data, error } = await supabase
          .from('reviews')
          .select('id, title, slug, cover_url')
          .order('created_at', { ascending: false })

        const list = document.getElementById('reviewList')
        if (error) {
          list.innerHTML = `<div class="loading">Erro: ${error.message}</div>`
          return
        }

        document.getElementById('reviewCount').textContent = data.length

        if (data.length === 0) {
          list.innerHTML = '<div class="loading">Nenhuma review ainda.</div>'
          return
        }

        list.innerHTML = data
          .map(
            r => `
          <div class="review-item" data-id="${r.id}">
            <img src="${r.cover_url || 'img/cookie.png'}" alt="${
              r.title
            }" onerror="this.src='img/cookie.png'" />
            <div class="review-item-info">
              <p class="review-item-title">${r.title}</p>
              <p class="review-item-slug">${r.slug}</p>
            </div>
          </div>
        `,
          )
          .join('')

        list.querySelectorAll('.review-item').forEach(el => {
          el.addEventListener('click', () => editReview(el.dataset.id))
        })
      }

      async function editReview(id) {
        currentReviewId = id
        document
          .querySelectorAll('.review-item')
          .forEach(el => el.classList.toggle('active', el.dataset.id === id))

        const { data, error } = await supabase
          .from('reviews')
          .select('*')
          .eq('id', id)
          .single()
        if (error) return alert(error.message)

        document.getElementById('fTitle').value = data.title || ''
        document.getElementById('fSlug').value = data.slug || ''
        document.getElementById('fSummary').value = data.summary || ''
        document.getElementById('fPlatforms').value = data.platforms || ''
        document.getElementById('fScore').value = data.score ?? ''

        // Banner
        document.getElementById('fBanner').value = data.banner_url || ''
        if (data.banner_url) {
          document.getElementById('bannerPreview').src = data.banner_url
          document.getElementById('bannerPreview').style.display = 'block'
          document.getElementById('bannerUploadLabel').textContent =
            'Imagem atual ↑'
          document.getElementById('bannerStatus').textContent = ''
        }

        // Capa
        document.getElementById('fCover').value = data.cover_url || ''
        if (data.cover_url) {
          document.getElementById('coverPreview').src = data.cover_url
          document.getElementById('coverPreview').style.display = 'block'
          document.getElementById('coverUploadLabel').textContent =
            'Imagem atual ↑'
          document.getElementById('coverStatus').textContent = ''
        }

        sections = Array.isArray(data.sections) ? data.sections : []
        renderSections()

        document.getElementById('editorTitle').textContent = 'Editando review'
        document.getElementById('editorContent').style.display = 'block'
        document.getElementById('editorPlaceholder').style.display = 'none'
        document.getElementById('deleteReviewBtn').style.display = 'inline-flex'
      }

      document.getElementById('newReviewBtn').addEventListener('click', () => {
        currentReviewId = null
        sections = []
        ;[
          'fTitle',
          'fSlug',
          'fSummary',
          'fPlatforms',
          'fScore',
          'fBanner',
          'fCover',
        ].forEach(id => {
          document.getElementById(id).value = ''
        })
        ;['bannerPreview', 'coverPreview'].forEach(id => {
          const el = document.getElementById(id)
          el.src = ''
          el.style.display = 'none'
        })
        document.getElementById('bannerUploadLabel').textContent =
          '📁 Clique para selecionar'
        document.getElementById('coverUploadLabel').textContent =
          '📁 Clique para selecionar'
        document.getElementById('bannerStatus').textContent = ''
        document.getElementById('coverStatus').textContent = ''
        renderSections()
        document.getElementById('editorTitle').textContent = 'Nova Review'
        document.getElementById('editorContent').style.display = 'block'
        document.getElementById('editorPlaceholder').style.display = 'none'
        document.getElementById('deleteReviewBtn').style.display = 'none'
        document
          .querySelectorAll('.review-item')
          .forEach(el => el.classList.remove('active'))
      })

      document
        .getElementById('saveReviewBtn')
        .addEventListener('click', async () => {
          const payload = {
            title: document.getElementById('fTitle').value.trim(),
            slug: document.getElementById('fSlug').value.trim(),
            summary: document.getElementById('fSummary').value.trim(),
            banner_url: document.getElementById('fBanner').value.trim(),
            cover_url: document.getElementById('fCover').value.trim(),
            platforms: document.getElementById('fPlatforms').value.trim(),
            score: parseFloat(document.getElementById('fScore').value) || null,
            sections,
          }

          if (!payload.title || !payload.slug)
            return showSaveMsg('Título e slug são obrigatórios.', false)

          let error
          if (currentReviewId) {
            ;({ error } = await supabase
              .from('reviews')
              .update(payload)
              .eq('id', currentReviewId))
          } else {
            const { data, error: e } = await supabase
              .from('reviews')
              .insert(payload)
              .select()
              .single()
            error = e
            if (data) currentReviewId = data.id
          }

          if (error) return showSaveMsg(error.message, false)
          showSaveMsg('Salvo com sucesso!', true)
          loadReviews()
        })

      document
        .getElementById('deleteReviewBtn')
        .addEventListener('click', async () => {
          if (!confirm('Excluir esta review?')) return
          const { error } = await supabase
            .from('reviews')
            .delete()
            .eq('id', currentReviewId)
          if (error) return alert(error.message)
          currentReviewId = null
          document.getElementById('editorContent').style.display = 'none'
          document.getElementById('editorPlaceholder').style.display = 'block'
          loadReviews()
        })

      function showSaveMsg(msg, ok) {
        const el = document.getElementById('saveMsg')
        el.className = ok ? 'success-msg' : 'error-msg'
        el.textContent = msg
        el.style.display = 'block'
        setTimeout(() => {
          el.style.display = 'none'
        }, 3000)
      }

      // ── SECTIONS EDITOR ──
      function renderSections() {
        const wrapper = document.getElementById('sectionsWrapper')
        wrapper.innerHTML = ''
        sections.forEach((sec, i) => {
          const div = document.createElement('div')
          div.className = 'editor-section'
          const typeLabel =
            sec.type === 'paragraph'
              ? 'Parágrafo'
              : sec.type === 'quote'
                ? 'Citação'
                : 'Imagem'
          const typeClass =
            sec.type === 'quote'
              ? 'quote-type'
              : sec.type === 'image'
                ? 'image-type'
                : ''

          div.innerHTML = `
            <div class="editor-section-header">
              <span class="editor-section-type ${typeClass}">${typeLabel}</span>
              <div style="display:flex; gap:0.4rem;">
                <button class="btn btn-sm btn-secondary" onclick="moveSec(${i}, -1)">↑</button>
                <button class="btn btn-sm btn-secondary" onclick="moveSec(${i}, 1)">↓</button>
                <button class="btn btn-sm btn-danger" onclick="removeSec(${i})">✕</button>
              </div>
            </div>
            ${
              sec.type === 'image'
                ? `
              <div style="display:flex; flex-direction:column; gap:0.5rem;">
                <div class="upload-area" style="padding:0.75rem;" onclick="document.getElementById('secImg${i}').click()">
                  <input type="file" id="secImg${i}" accept="image/*" style="display:none" data-idx="${i}" />
                  ${
                    sec.url
                      ? `<img src="${sec.url}" style="height:60px; border-radius:4px; object-fit:cover;" />`
                      : '<span style="color:hsl(38 30% 55%); font-size:0.8rem;">📁 Clique para selecionar</span>'
                  }
                </div>
                <span class="upload-status" id="secImgStatus${i}">${
                  sec.url ? '✅ Imagem carregada' : ''
                }</span>
              </div>
            `
                : `
              <textarea class="sec-input" placeholder="${
                sec.type === 'quote' ? 'Texto da citação...' : 'Parágrafo...'
              }" data-idx="${i}" data-field="text">${sec.text || ''}</textarea>
            `
            }
          `
          wrapper.appendChild(div)
        })

        wrapper.querySelectorAll('.sec-input').forEach(el => {
          el.addEventListener('input', () => {
            sections[parseInt(el.dataset.idx)][el.dataset.field] = el.value
          })
        })

        // Upload de imagem nas sections
        sections.forEach((sec, i) => {
          if (sec.type !== 'image') return
          const input = document.getElementById(`secImg${i}`)
          if (!input) return
          input.addEventListener('change', async () => {
            const file = input.files[0]
            if (!file) return
            const status = document.getElementById(`secImgStatus${i}`)
            status.textContent = 'Enviando...'
            const ext = file.name.split('.').pop()
            const path = `sections/${Date.now()}-${Math.random()
              .toString(36)
              .slice(2)}.${ext}`
            const { error } = await supabase.storage
              .from('reviews')
              .upload(path, file)
            if (error) {
              status.textContent = `Erro: ${error.message}`
              return
            }
            const {
              data: { publicUrl },
            } = supabase.storage.from('reviews').getPublicUrl(path)
            sections[i].url = publicUrl
            status.textContent = '✅ Upload concluído'
            renderSections()
          })
        })
      }

      window.moveSec = (i, dir) => {
        const j = i + dir
        if (j < 0 || j >= sections.length) return
        ;[sections[i], sections[j]] = [sections[j], sections[i]]
        renderSections()
      }

      window.removeSec = i => {
        sections.splice(i, 1)
        renderSections()
      }

      document.getElementById('addText').addEventListener('click', () => {
        sections.push({ type: 'paragraph', text: '' })
        renderSections()
        document
          .getElementById('sectionsWrapper')
          .lastElementChild?.scrollIntoView({ behavior: 'smooth' })
      })

      document.getElementById('addQuote').addEventListener('click', () => {
        sections.push({ type: 'quote', text: '' })
        renderSections()
        document
          .getElementById('sectionsWrapper')
          .lastElementChild?.scrollIntoView({ behavior: 'smooth' })
      })

      document.getElementById('addImage').addEventListener('click', () => {
        sections.push({ type: 'image', url: '' })
        renderSections()
        document
          .getElementById('sectionsWrapper')
          .lastElementChild?.scrollIntoView({ behavior: 'smooth' })
      })
    </script>
  </body>
</html>
